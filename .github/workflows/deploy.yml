name: Deploy to Plesk

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            REPO_DIR=/opt/portafolio-web
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/AzVzz/portafolio-web.git $REPO_DIR
            fi
            cd $REPO_DIR
            git pull origin main
            docker compose down
            docker compose build --no-cache
            docker compose up -d
